plugins {
    id 'com.android.application' version '8.1.0'
    id 'org.jetbrains.kotlin.android' version '1.9.0'
}

android {
    namespace "com.example.screentool"
    compileSdk 34

    defaultConfig {
        applicationId "com.example.screentool"
        minSdk 19 // תמיכה מלאה ב-Android 4.4 KitKat
        targetSdk 34
        versionCode 1
        versionName "1.0"
        
        multiDexEnabled true // מונע שגיאות בניתוח החבילה במכשירים ישנים
        
        // חובה עבור Android 4.4 - מאפשר שימוש באייקוני וקטור מודרניים ללא קריסה
        vectorDrawables.useSupportLibrary = true 
    }

    buildTypes {
        release { 
            minifyEnabled false 
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    // גרסאות משונמכות ומותאמות במיוחד שיאפשרו לאפליקציה לרוץ על API 19:
    implementation 'androidx.core:core-ktx:1.9.0' 
    implementation 'androidx.appcompat:appcompat:1.4.2' 
    implementation 'com.google.android.material:material:1.5.0' 
    implementation 'androidx.multidex:multidex:2.0.1' 
}
