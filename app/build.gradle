plugins {
    id 'com.android.application' version '8.1.0'
    id 'org.jetbrains.kotlin.android' version '1.9.0'
}

android {
    namespace "com.example.screentool"
    compileSdk 34

    defaultConfig {
        applicationId "com.example.screentool"
        minSdk 19 // תמיכה מוגדרת עבור Android 4.4 KitKat
        targetSdk 34
        versionCode 1
        versionName "1.0"
        
        // הפעלת MultiDex חובה עבור מכשירים ישנים למניעת שגיאות בניתוח החבילה וקריסות
        multiDexEnabled true 
    }

    buildTypes {
        release { 
            minifyEnabled false 
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.13.1'
    implementation 'androidx.appcompat:appcompat:1.6.1' // שונמך מ-1.7.0 כדי לאפשר תמיכה ב-API 19
    implementation 'com.google.android.material:material:1.12.0'
    implementation 'androidx.multidex:multidex:2.0.1' // תוספת ספריית תמיכה ב-MultiDex למכשירים ישנים
}
